<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="pictures/favicon.png">
<title>Asynchronous Process Call Injection</title>

<style>
    :root {
        --bg: #f8f9fb;
        --card: #ffffff;
        --accent: #2563eb;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #e5e7eb;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
        background: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        padding: 60px 20px;
    }

    .container {
        width: 100%;
        max-width: 750px;
    }

    h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
    }

    .subtitle {
        color: var(--muted);
        margin-bottom: 40px;
    }

    .accordion-item {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 15px;
        overflow: hidden;
        transition: 0.2s ease;
    }

    .accordion-item:hover {
        border-color: var(--accent);
    }

    .accordion-header {
        padding: 16px 20px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 500;
    }

    .accordion-header span {
        transition: transform 0.3s ease;
    }

    .accordion-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.35s ease;
        padding: 0 20px;
        color: var(--muted);
    }

    .accordion-content p {
        padding: 15px 0;
        line-height: 1.6;
    }

    .accordion-item.active .accordion-content {
        max-height: 200px;
    }

    .accordion-item.active .accordion-header span {
        transform: rotate(45deg);
    }

    footer {
        margin-top: 40px;
        font-size: 0.9rem;
        color: var(--muted);
        text-align: center;
    }

    @media (max-width: 500px) {
        h1 {
            font-size: 2rem;
        }
    }
</style>
</head>

  <body>
    <h1>Asynchronous Process Call Injection</h1><br>
    <p class="subtitle">Executing shellcode within a process.</p><br>
      <br>
      <p>
          This entry aims to explain <b>what is an Asynchronous Process Call, how does it work and how it can be exploited </b> to execute shellcode.
      </p>
